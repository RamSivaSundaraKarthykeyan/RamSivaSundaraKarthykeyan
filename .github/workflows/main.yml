name: Update Profile README

on:
  schedule:
    # Runs every 24 hours
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Update GitHub Stats
        # This is a placeholder for any action you want to run
        # Most "Stats" images update via URL, but you can add
        # Blog-post-workflow or Wakatime-sync here.
        run: |
          echo "Syncing profile metrics..."
          date > last_updated.txt

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "docs: automated profile refresh" || exit 0
          git push
